name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shell-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shell syntax check
        run: |
          bash -n install.sh menu.sh test.sh uninstall.sh package.sh sun.sh files/security-update-notify

      - name: ShellCheck
        run: |
          shellcheck -s bash -S warning -e SC2034,SC1091 install.sh menu.sh test.sh uninstall.sh package.sh sun.sh files/security-update-notify

      - name: Dotenv parser regression check
        run: |
          python3 - <<'PY'
          from pathlib import Path
          s = Path('install.sh').read_text()
          start = s.index('load_env_file() {')
          end = s.index('\nrequire_arg()', start)
          harness = '''#!/usr/bin/env bash
          set -euo pipefail
          CHECK_TIME="09:00"; TELEGRAM_BOT_TOKEN=""; TELEGRAM_CHAT_ID=""; HOST_LABEL=""; PUBLIC_IP=""; INCLUDE_PUBLIC_IP="1"; NOTIFY_OK=""; DEDUP_MODE=""; DEDUP_INTERVAL_DAYS="3"; NOTIFY_LANG="zh"; BACKEND="auto"; SEND_TEST=0; SKIP_TELEGRAM_TEST=0; NON_INTERACTIVE=0; ASSUME_YES=0; ALLOW_BEST_EFFORT=0
          ''' + s[start:end] + '''
          load_env_file "$1"
          printf '%s\n' "$TELEGRAM_BOT_TOKEN" "$TELEGRAM_CHAT_ID" "$CHECK_TIME" "$NOTIFY_LANG" "$DEDUP_MODE" "$SEND_TEST" "$ALLOW_BEST_EFFORT" "$HOST_LABEL" "$PUBLIC_IP" "$INCLUDE_PUBLIC_IP" "$NOTIFY_OK"
          '''
          Path('/tmp/sun-env-harness.sh').write_text(harness)
          PY
          chmod +x /tmp/sun-env-harness.sh
          cat >/tmp/sun.env <<'EOF'
          TELEGRAM_BOT_TOKEN=abc123 # inline comment
          TELEGRAM_CHAT_ID=-100123
          CHECK_TIME=10:30
          NOTIFY_LANG=en
          DEDUP_MODE=daily
          SEND_TEST=TRUE
          ALLOW_BEST_EFFORT=Yes
          HOST_LABEL="prod web 01"
          PUBLIC_IP=203.0.113.10
          INCLUDE_PUBLIC_IP=0
          NOTIFY_OK=yes
          EOF
          /tmp/sun-env-harness.sh /tmp/sun.env > /tmp/sun-env.out
          diff -u /tmp/sun-env.out - <<'EOF'
          abc123
          -100123
          10:30
          en
          daily
          1
          1
          prod web 01
          203.0.113.10
          0
          1
          EOF
          if /tmp/sun-env-harness.sh <(echo 'BAD_KEY=x') >/tmp/bad.out 2>/tmp/bad.err; then
            echo "Unexpectedly accepted unknown env key" >&2
            exit 1
          fi

      - name: Notification language regression check
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          cp files/security-update-notify "$tmp/security-update-notify"
          sed -i \
            -e "s|^STATE_DIR=.*|STATE_DIR=\"$tmp/state\"|" \
            -e "s|^LOCK_FILE=.*|LOCK_FILE=\"$tmp/security-update-notify.lock\"|" \
            -e "s|^LOG_FILE=.*|LOG_FILE=\"$tmp/security-update-notify.log\"|" \
            "$tmp/security-update-notify"
          chmod +x "$tmp/security-update-notify"
          mkdir -p "$tmp/bin"
          cat >"$tmp/bin/python3" <<'EOF'
          #!/usr/bin/env bash
          exec /usr/bin/python3 -c 'import os, sys
          payload = sys.stdin.buffer.read().split(b"\0", 2)
          text = payload[2].decode("utf-8", "replace") if len(payload) > 2 else ""
          capture = os.environ.get("CAPTURE")
          if capture:
              with open(capture, "w", encoding="utf-8") as fh:
                  fh.write(text)
          print("{\"ok\": true}")
          '
          EOF
          chmod +x "$tmp/bin/python3"

          cat >"$tmp/env.alert.zh" <<'EOF'
          TELEGRAM_BOT_TOKEN=fake
          TELEGRAM_CHAT_ID=fake
          NOTIFY_LANG=zh
          BACKEND=apt
          INCLUDE_PUBLIC_IP=0
          EOF
          cat >"$tmp/env.alert.en" <<'EOF'
          TELEGRAM_BOT_TOKEN=fake
          TELEGRAM_CHAT_ID=fake
          NOTIFY_LANG=en
          BACKEND=apt
          DEDUP_MODE=always
          EOF
          cat >"$tmp/env.ok.zh" <<'EOF'
          TELEGRAM_BOT_TOKEN=fake
          TELEGRAM_CHAT_ID=fake
          NOTIFY_LANG=zh
          BACKEND=dnf
          PUBLIC_IP=203.0.113.10
          EOF
          cat >"$tmp/env.ok.en" <<'EOF'
          TELEGRAM_BOT_TOKEN=fake
          TELEGRAM_CHAT_ID=fake
          NOTIFY_LANG=en
          BACKEND=dnf
          DEDUP_MODE=always
          EOF

          PATH="$tmp/bin:$PATH" SECURITY_UPDATE_NOTIFY_ENV="$tmp/env.alert.zh" CAPTURE="$tmp/alert.zh.msg" "$tmp/security-update-notify" --test-reboot --no-dedupe >/dev/null
          PATH="$tmp/bin:$PATH" SECURITY_UPDATE_NOTIFY_ENV="$tmp/env.alert.en" CAPTURE="$tmp/alert.en.msg" "$tmp/security-update-notify" --test-reboot --no-dedupe >/dev/null
          PATH="$tmp/bin:$PATH" SECURITY_UPDATE_NOTIFY_ENV="$tmp/env.ok.zh" CAPTURE="$tmp/ok.zh.msg" "$tmp/security-update-notify" --test-ok --no-dedupe >/dev/null
          PATH="$tmp/bin:$PATH" SECURITY_UPDATE_NOTIFY_ENV="$tmp/env.ok.en" CAPTURE="$tmp/ok.en.msg" "$tmp/security-update-notify" --test-ok --no-dedupe >/dev/null

          grep -q '安全更新后需要处理' "$tmp/alert.zh.msg"
          ! grep -q 'Security update action required' "$tmp/alert.zh.msg"
          ! grep -q '公网 IP：' "$tmp/alert.zh.msg"
          grep -q 'Security update action required' "$tmp/alert.en.msg"
          ! grep -q '安全更新后需要处理' "$tmp/alert.en.msg"
          grep -q '安全更新检查正常' "$tmp/ok.zh.msg"
          grep -q '公网 IP：203.0.113.10' "$tmp/ok.zh.msg"
          ! grep -q 'Security update check OK' "$tmp/ok.zh.msg"
          grep -q 'Security update check OK' "$tmp/ok.en.msg"
          ! grep -q '安全更新检查正常' "$tmp/ok.en.msg"

      - name: Package release artifact
        run: ./package.sh

      - name: Verify checksum
        run: |
          cd dist
          sha256sum -c security-update-notify-*.tar.gz.sha256

      - name: Inspect package contents
        run: |
          mkdir -p /tmp/security-update-notify-ci
          tar -xzf dist/security-update-notify-*.tar.gz -C /tmp/security-update-notify-ci
          find /tmp/security-update-notify-ci -maxdepth 3 -type f -print | sort
          tar -tzf dist/security-update-notify-*.tar.gz | grep '/.env.example$'
          ! tar -tzf dist/security-update-notify-*.tar.gz | grep -E '/\.env$|/\.env\.(local|production)$'

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-update-notify-dist
          path: dist/*
